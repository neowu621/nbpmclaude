<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>重設密碼 | Claude PM 入門手冊</title>
<style>
  :root{--bg:#f7f4ee;--card:#fff;--text:#1f1e1d;--muted:#6b6660;--accent:#cc785c;--accent-dark:#a85f47;--border:#e4ddd2}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:"Noto Sans TC","Microsoft JhengHei",sans-serif;background:var(--bg);color:var(--text);
       min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;line-height:1.7}
  .card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:32px;width:100%;max-width:400px}
  h1{font-size:20px;margin-bottom:20px}
  label{display:block;font-size:13.5px;font-weight:600;margin:14px 0 6px}
  input{width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:8px;font-family:inherit;font-size:14.5px;background:#fdfbf7}
  .btn{width:100%;margin-top:20px;padding:12px;background:var(--text);color:#fff;border:none;border-radius:999px;font-family:inherit;font-size:15px;font-weight:600;cursor:pointer}
  .msg{margin-top:14px;font-size:13.5px;padding:10px 12px;border-radius:8px;display:none}
  .msg.err{display:block;background:#f8e3e0;color:#a53f2f}
  .msg.ok{display:block;background:#e8f0e9;color:#3d6b4a}
</style>
<script>window.NBPM_API="https://api-nbpmclaude.zeabur.app";</script>
</head>
<body>
<div class="card">
  <h1>重設密碼</h1>
  <label>新密碼（至少 8 碼）</label><input id="pw" type="password" autocomplete="new-password">
  <label>再次輸入</label><input id="pw2" type="password" autocomplete="new-password">
  <button class="btn" id="btn">更新密碼</button>
  <div class="msg" id="msg"></div>
</div>
<script>
  var API = window.NBPM_API || '';
  var token = new URLSearchParams(location.search).get('token');
  function msg(t, ok){ var m=document.getElementById('msg'); m.className='msg'+(t?(ok?' ok':' err'):''); m.textContent=t||''; }
  document.getElementById('btn').onclick=function(){
    var pw=document.getElementById('pw').value, pw2=document.getElementById('pw2').value;
    if(pw.length<8){ msg('密碼至少 8 碼'); return; }
    if(pw!==pw2){ msg('兩次輸入不一致'); return; }
    fetch(API+'/api/auth/reset',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({token:token,password:pw})})
      .then(function(r){ return r.json().then(function(j){ return {ok:r.ok,j:j}; }); })
      .then(function(r){
        msg(r.j.message||r.j.error||'', r.ok);
        if(r.ok) setTimeout(function(){ location.href='/login.html'; }, 1500);
      });
  };
</script>
</body>
</html>
