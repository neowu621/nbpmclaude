<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<script>(function(){var d=document.documentElement;d.style.visibility="hidden";fetch("/api/auth/me",{credentials:"include"}).then(function(r){if(!r.ok)throw 0;return r.json();}).then(function(j){window.__me=j.user||{};d.style.visibility="";}).catch(function(){location.replace("/login.html?next="+encodeURIComponent(location.pathname));});})();</script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>共學看板 | Claude PM 入門手冊</title>
<style>
  :root{--bg:#f7f4ee;--card:#fff;--text:#1f1e1d;--muted:#6b6660;--accent:#cc785c;--accent-dark:#a85f47;--border:#e4ddd2;--soft:#faf7f1;--hi:#fbf0ea}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:"Noto Sans TC","Microsoft JhengHei",sans-serif;background:var(--bg);color:var(--text);line-height:1.6;padding:28px}
  .wrap{max-width:1080px;margin:0 auto}
  .top{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;margin-bottom:6px}
  .top h1{font-size:22px}
  .top .actions{display:flex;gap:10px;align-items:center}
  .lnk{color:var(--accent-dark);text-decoration:none;font-size:14px;font-weight:600}
  .btn-out{padding:8px 16px;border:1px solid var(--border);border-radius:999px;background:var(--card);color:var(--muted);
       font-family:inherit;font-size:14px;font-weight:600;cursor:pointer;text-decoration:none}
  .btn-out:hover{background:var(--soft)}
  .btn-adm{border-color:var(--accent);color:var(--accent-dark)}
  .intro{color:var(--muted);font-size:14px;margin-bottom:22px}
  .cards{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:28px}
  .stat{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:20px 22px}
  .stat .k{font-size:13px;color:var(--muted);margin-bottom:6px}
  .stat .v{font-size:30px;font-weight:700;color:var(--accent-dark)}
  .stat .u{font-size:13px;color:var(--muted);font-weight:400;margin-left:4px}
  section{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:6px 4px 4px;margin-bottom:24px;overflow:hidden}
  section h2{font-size:16px;padding:14px 18px 4px}
  section .hint{font-size:12.5px;color:var(--muted);padding:0 18px 10px}
  .scroll{overflow-x:auto}
  table{width:100%;border-collapse:collapse;font-size:13.5px;min-width:520px}
  th,td{text-align:left;padding:10px 14px;border-top:1px solid var(--border);white-space:nowrap}
  th{color:var(--muted);font-weight:600;font-size:12.5px;background:var(--soft)}
  td.num,th.num{text-align:right}
  tr:hover td{background:var(--soft)}
  tr.me td{background:var(--hi)}
  .rank{display:inline-flex;width:24px;height:24px;align-items:center;justify-content:center;border-radius:50%;
       font-size:12.5px;font-weight:700;background:var(--soft);color:var(--muted)}
  .rank.r1{background:#f6e2c2;color:#8a5a12}.rank.r2{background:#e7e5df;color:#5f5e5a}.rank.r3{background:#f0ddd2;color:#8a4b2c}
  .metag{margin-left:6px;font-size:11px;font-weight:700;color:var(--accent-dark);background:#f2ddd4;padding:1px 7px;border-radius:999px}
  .mono{font-family:ui-monospace,Menlo,Consolas,monospace;font-size:12.5px;color:var(--muted)}
  .bars{padding:6px 14px 12px}
  .bar-row{display:flex;align-items:center;gap:12px;padding:8px 4px;border-top:1px solid var(--border)}
  .bar-row:first-child{border-top:none}
  .bar-label{flex:0 0 40%;min-width:0;font-family:ui-monospace,Menlo,Consolas,monospace;font-size:12.5px;color:var(--text);
       overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .bar-wrap{flex:1;background:var(--soft);border-radius:6px;height:22px;position:relative;overflow:hidden}
  .bar-fill{height:100%;background:var(--accent);border-radius:6px;min-width:2px;transition:width .5s}
  .bar-val{flex:0 0 auto;font-size:12.5px;color:var(--muted);white-space:nowrap;min-width:150px;text-align:right}
  .spinner{width:34px;height:34px;margin:36px auto;border:3px solid var(--border);border-top-color:var(--accent-dark);
       border-radius:50%;animation:spin .7s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  .empty{padding:26px 18px;color:var(--muted);font-size:14px;text-align:center}
  .err{margin:0 4px 20px;padding:12px 16px;border-radius:10px;background:#f8e3e0;color:#a53f2f;font-size:14px;display:none}
  .hide{display:none!important}
  @media(max-width:640px){.cards{grid-template-columns:1fr}body{padding:16px}.bar-label{flex-basis:34%}.bar-val{min-width:110px;font-size:11.5px}}
</style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <h1>🌱 共學看板</h1>
    <div class="actions">
      <a class="btn-out btn-adm hide" id="adminlink" href="/admin.html">帳號管理</a>
      <a class="lnk" href="/">← 回手冊</a>
      <button class="btn-out" id="logout">登出</button>
    </div>
  </div>
  <div class="intro">看看大家的學習足跡,一起互相激勵。以下資料所有學習夥伴皆可見(不含 Email)。</div>

  <div id="err" class="err"></div>

  <div class="cards">
    <div class="stat"><div class="k">已加入夥伴</div><div class="v"><span id="c-users">–</span><span class="u">人</span></div></div>
    <div class="stat"><div class="k">今日活躍</div><div class="v"><span id="c-active">–</span><span class="u">人</span></div></div>
    <div class="stat"><div class="k">平均每次造訪</div><div class="v"><span id="c-avg">–</span></div></div>
  </div>

  <section>
    <h2>學習排行榜</h2>
    <div class="hint">依總停留時間排序 — 你自己的那列會highlight。</div>
    <div id="lb-load" class="spinner"></div>
    <div class="scroll"><table id="lb-tbl" class="hide">
      <thead><tr>
        <th style="width:64px">名次</th><th>姓名</th>
        <th class="num">造訪次數</th><th class="num">總停留</th><th>最常看</th>
      </tr></thead>
      <tbody id="lb-body"></tbody>
    </table></div>
    <div id="lb-empty" class="empty hide">還沒有學習紀錄,快去讀第一章吧!</div>
  </section>

  <section>
    <h2>哪些頁面看得比較久</h2>
    <div class="hint">各頁面「總停留時間」比較 — 長條越長代表大家在這頁停留越久。</div>
    <div id="pg-load" class="spinner"></div>
    <div class="bars hide" id="pg-bars"></div>
    <div id="pg-empty" class="empty hide">還沒有頁面停留資料。</div>
  </section>
</div>

<script>
  var API = window.NBPM_API || '';
  function el(id){ return document.getElementById(id); }
  function esc(s){ var d=document.createElement('div'); d.textContent=(s==null?'':String(s)); return d.innerHTML; }
  function dur(s){
    s = parseInt(s,10) || 0;
    if(s < 60) return s + ' 秒';
    var m = Math.floor(s/60), sec = s%60;
    if(m < 60) return m + ' 分' + (sec ? ' ' + sec + ' 秒' : '');
    var h = Math.floor(m/60); m = m%60;
    return h + ' 時' + (m ? ' ' + m + ' 分' : '');
  }
  function showErr(msg){ var e=el('err'); e.textContent=msg; e.style.display='block'; }
  function get(path){ return fetch(API+path,{credentials:'include'}).then(function(r){ if(!r.ok) throw new Error(r.status); return r.json(); }); }

  // 管理者才顯示「帳號管理」入口
  if(window.__me && window.__me.role === 'admin'){ el('adminlink').classList.remove('hide'); }
  var myName = (window.__me && window.__me.name) || '';

  get('/api/stats/overview').then(function(d){
    el('c-users').textContent = d.users;
    el('c-active').textContent = d.activeToday;
    el('c-avg').textContent = dur(d.avgSessionSeconds);
  }).catch(function(){ showErr('載入概覽失敗,請重新整理。'); });

  get('/api/stats/leaderboard').then(function(d){
    el('lb-load').classList.add('hide');
    var rows = d.people || [];
    if(!rows.length){ el('lb-empty').classList.remove('hide'); return; }
    var html = rows.map(function(p, i){
      var rank = i+1;
      var rcls = rank<=3 ? ' r'+rank : '';
      var isMe = myName && p.display_name === myName;
      return '<tr class="' + (isMe?'me':'') + '">' +
        '<td><span class="rank'+rcls+'">'+rank+'</span></td>' +
        '<td>' + esc(p.display_name) + (isMe?'<span class="metag">你</span>':'') + '</td>' +
        '<td class="num">' + (p.visits||0) + '</td>' +
        '<td class="num">' + dur(p.total_seconds) + '</td>' +
        '<td class="mono">' + esc(p.top_path || '—') + '</td>' +
      '</tr>';
    }).join('');
    el('lb-body').innerHTML = html;
    el('lb-tbl').classList.remove('hide');
  }).catch(function(){ el('lb-load').classList.add('hide'); showErr('載入排行榜失敗,請重新整理。'); });

  get('/api/stats/pages').then(function(d){
    el('pg-load').classList.add('hide');
    var rows = d.pages || [];
    if(!rows.length){ el('pg-empty').classList.remove('hide'); return; }
    var max = rows.reduce(function(m,p){ return Math.max(m, p.total_seconds||0); }, 0) || 1;
    var html = rows.map(function(p){
      var pct = Math.round((p.total_seconds||0)/max*100);
      return '<div class="bar-row">' +
        '<div class="bar-label" title="'+esc(p.path)+'">' + esc(p.path) + '</div>' +
        '<div class="bar-wrap"><div class="bar-fill" style="width:'+pct+'%"></div></div>' +
        '<div class="bar-val">' + dur(p.total_seconds) + ' · ' + (p.viewers||0) + ' 人 · 均 ' + dur(p.avg_seconds) + '</div>' +
      '</div>';
    }).join('');
    el('pg-bars').innerHTML = html;
    el('pg-bars').classList.remove('hide');
  }).catch(function(){ el('pg-load').classList.add('hide'); showErr('載入頁面資料失敗,請重新整理。'); });

  el('logout').onclick = function(){
    fetch(API+'/api/auth/logout',{method:'POST',credentials:'include'})
      .then(function(){ location.href='/login.html'; }).catch(function(){ location.href='/login.html'; });
  };
</script>
</body>
</html>
