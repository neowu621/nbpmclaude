<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<script>(function(){var d=document.documentElement;d.style.visibility="hidden";fetch("/api/auth/me",{credentials:"include"}).then(function(r){if(!r.ok)throw 0;return r.json();}).then(function(j){if(!j.user||j.user.role!=="admin"){location.replace("/");return;}d.style.visibility="";}).catch(function(){location.replace("/login.html?next="+encodeURIComponent(location.pathname));});})();</script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>學習後台 | Claude PM 入門手冊</title>
<style>
  :root{--bg:#f7f4ee;--card:#fff;--text:#1f1e1d;--muted:#6b6660;--accent:#cc785c;--accent-dark:#a85f47;--border:#e4ddd2;--soft:#faf7f1}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:"Noto Sans TC","Microsoft JhengHei",sans-serif;background:var(--bg);color:var(--text);line-height:1.6;padding:28px}
  .wrap{max-width:1080px;margin:0 auto}
  .top{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;margin-bottom:24px}
  .top h1{font-size:22px}
  .top .actions{display:flex;gap:10px;align-items:center}
  .lnk{color:var(--accent-dark);text-decoration:none;font-size:14px;font-weight:600}
  .btn-out{padding:8px 16px;border:1px solid var(--border);border-radius:999px;background:var(--card);color:var(--muted);
       font-family:inherit;font-size:14px;font-weight:600;cursor:pointer}
  .btn-out:hover{background:var(--soft)}
  .cards{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:28px}
  .stat{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:20px 22px}
  .stat .k{font-size:13px;color:var(--muted);margin-bottom:6px}
  .stat .v{font-size:30px;font-weight:700;color:var(--accent-dark)}
  .stat .u{font-size:13px;color:var(--muted);font-weight:400;margin-left:4px}
  section{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:6px 4px 4px;margin-bottom:24px;overflow:hidden}
  section h2{font-size:16px;padding:14px 18px 10px}
  .scroll{overflow-x:auto}
  table{width:100%;border-collapse:collapse;font-size:13.5px;min-width:640px}
  th,td{text-align:left;padding:10px 14px;border-top:1px solid var(--border);white-space:nowrap}
  th{color:var(--muted);font-weight:600;font-size:12.5px;background:var(--soft)}
  td.num,th.num{text-align:right}
  tr:hover td{background:var(--soft)}
  .tag{display:inline-block;font-size:11.5px;font-weight:600;padding:1px 8px;border-radius:999px}
  .tag.admin{background:#efe3dd;color:var(--accent-dark)}
  .tag.member{background:#eceae4;color:var(--muted)}
  .tag.no{background:#f8e3e0;color:#a53f2f}
  .mono{font-family:ui-monospace,Menlo,Consolas,monospace;font-size:12.5px;color:var(--muted)}
  .spinner{width:34px;height:34px;margin:40px auto;border:3px solid var(--border);border-top-color:var(--accent-dark);
       border-radius:50%;animation:spin .7s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  .empty{padding:26px 18px;color:var(--muted);font-size:14px;text-align:center}
  .err{margin:0 4px 20px;padding:12px 16px;border-radius:10px;background:#f8e3e0;color:#a53f2f;font-size:14px}
  @media(max-width:640px){.cards{grid-template-columns:1fr}body{padding:16px}}
</style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <h1>📊 學習後台</h1>
    <div class="actions">
      <a class="lnk" href="/">← 回手冊</a>
      <button class="btn-out" id="logout">登出</button>
    </div>
  </div>

  <div id="err" class="err hide" style="display:none"></div>

  <div class="cards">
    <div class="stat"><div class="k">已驗證使用者</div><div class="v"><span id="c-users">–</span><span class="u">人</span></div></div>
    <div class="stat"><div class="k">今日活躍</div><div class="v"><span id="c-active">–</span><span class="u">人</span></div></div>
    <div class="stat"><div class="k">平均每次造訪時長</div><div class="v"><span id="c-avg">–</span></div></div>
  </div>

  <section>
    <h2>每位使用者</h2>
    <div id="people-load" class="spinner"></div>
    <div class="scroll"><table id="people-tbl" style="display:none">
      <thead><tr>
        <th>姓名</th><th>Email</th><th>角色</th><th>註冊日</th><th>最後活躍</th>
        <th class="num">造訪次數</th><th class="num">總停留</th><th>最常看</th>
      </tr></thead>
      <tbody id="people-body"></tbody>
    </table></div>
    <div id="people-empty" class="empty hide" style="display:none">目前還沒有使用者資料。</div>
  </section>

  <section>
    <h2>頁面黏著度排行</h2>
    <div id="pages-load" class="spinner"></div>
    <div class="scroll"><table id="pages-tbl" style="display:none">
      <thead><tr>
        <th>頁面</th><th class="num">觀看人數</th><th class="num">總停留</th><th class="num">平均每人</th>
      </tr></thead>
      <tbody id="pages-body"></tbody>
    </table></div>
    <div id="pages-empty" class="empty hide" style="display:none">目前還沒有頁面停留資料。</div>
  </section>
</div>

<script>
  var API = window.NBPM_API || '';
  function el(id){ return document.getElementById(id); }
  function esc(s){ var d=document.createElement('div'); d.textContent=(s==null?'':String(s)); return d.innerHTML; }

  // 秒數 → 人類可讀
  function dur(s){
    s = parseInt(s,10) || 0;
    if(s < 60) return s + ' 秒';
    var m = Math.floor(s/60), sec = s%60;
    if(m < 60) return m + ' 分' + (sec ? ' ' + sec + ' 秒' : '');
    var h = Math.floor(m/60); m = m%60;
    return h + ' 時' + (m ? ' ' + m + ' 分' : '');
  }
  // ISO 時間 → 本地簡短格式
  function when(iso){
    if(!iso) return '—';
    var d = new Date(iso);
    if(isNaN(d)) return '—';
    var p = function(n){ return (n<10?'0':'') + n; };
    return d.getFullYear() + '/' + p(d.getMonth()+1) + '/' + p(d.getDate()) + ' ' + p(d.getHours()) + ':' + p(d.getMinutes());
  }
  function dateOnly(iso){
    if(!iso) return '—';
    var d = new Date(iso); if(isNaN(d)) return '—';
    var p = function(n){ return (n<10?'0':'') + n; };
    return d.getFullYear() + '/' + p(d.getMonth()+1) + '/' + p(d.getDate());
  }
  function showErr(msg){ var e=el('err'); e.textContent=msg; e.style.display='block'; }

  function get(path){
    return fetch(API + path, {credentials:'include'}).then(function(r){
      if(!r.ok) throw new Error('HTTP ' + r.status);
      return r.json();
    });
  }

  // 概覽
  get('/api/stats/overview').then(function(d){
    el('c-users').textContent = d.users;
    el('c-active').textContent = d.activeToday;
    el('c-avg').textContent = dur(d.avgSessionSeconds);
  }).catch(function(){ showErr('載入概覽失敗,請重新整理。'); });

  // 每人
  get('/api/stats/people').then(function(d){
    el('people-load').style.display = 'none';
    var rows = d.people || [];
    if(!rows.length){ el('people-empty').style.display='block'; return; }
    var html = rows.map(function(p){
      var role = p.role === 'admin'
        ? '<span class="tag admin">管理者</span>'
        : (p.email_verified ? '<span class="tag member">會員</span>' : '<span class="tag no">未驗證</span>');
      return '<tr>' +
        '<td>' + esc(p.display_name) + '</td>' +
        '<td class="mono">' + esc(p.email) + '</td>' +
        '<td>' + role + '</td>' +
        '<td>' + dateOnly(p.created_at) + '</td>' +
        '<td>' + when(p.last_seen) + '</td>' +
        '<td class="num">' + (p.visits||0) + '</td>' +
        '<td class="num">' + dur(p.total_seconds) + '</td>' +
        '<td class="mono">' + esc(p.top_path || '—') + '</td>' +
      '</tr>';
    }).join('');
    el('people-body').innerHTML = html;
    el('people-tbl').style.display = 'table';
  }).catch(function(){ el('people-load').style.display='none'; showErr('載入使用者資料失敗,請重新整理。'); });

  // 頁面
  get('/api/stats/pages').then(function(d){
    el('pages-load').style.display = 'none';
    var rows = d.pages || [];
    if(!rows.length){ el('pages-empty').style.display='block'; return; }
    var html = rows.map(function(p){
      return '<tr>' +
        '<td class="mono">' + esc(p.path) + '</td>' +
        '<td class="num">' + (p.viewers||0) + '</td>' +
        '<td class="num">' + dur(p.total_seconds) + '</td>' +
        '<td class="num">' + dur(p.avg_seconds) + '</td>' +
      '</tr>';
    }).join('');
    el('pages-body').innerHTML = html;
    el('pages-tbl').style.display = 'table';
  }).catch(function(){ el('pages-load').style.display='none'; showErr('載入頁面資料失敗,請重新整理。'); });

  // 登出
  el('logout').onclick = function(){
    fetch(API + '/api/auth/logout', {method:'POST', credentials:'include'})
      .then(function(){ location.href = '/login.html'; })
      .catch(function(){ location.href = '/login.html'; });
  };
</script>
</body>
</html>
